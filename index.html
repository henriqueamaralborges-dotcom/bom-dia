<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Drive | Premium Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- HUD Principal -->
        <div id="hud">
            <div class="hud-item">SCORE: <span id="score">0</span></div>
            <div class="hud-item txt-gold">GOLD: <span id="coins">0</span></div>
            <div style="display: flex; gap: 8px; pointer-events: auto;">
                <button id="btn-pause" class="btn" style="padding: 8px;">⏸</button>
                <button id="btn-shop" class="btn" style="padding: 8px;">🚗</button>
            </div>
        </div>
        
        <!-- Canvas do Jogo -->
        <canvas id="gameCanvas" width="400" height="700"></canvas>

        <!-- Menu Principal -->
        <div id="start-menu" class="overlay">
            <h1 class="main-title">INFINITY</h1>
            <h1 class="main-title" style="font-size: 36px; margin-top: -15px; margin-bottom: 20px;">DRIVE</h1>
            <p class="txt-gold" style="font-size: 18px; font-weight: 700;">BEST: <span id="high-score">0</span></p>
            
            <!-- Seletor de Modo -->
            <div id="mode-selector">
                <p style="font-size: 12px; margin-bottom: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px;">Select Terrain</p>
                <div class="mode-grid">
                    <button id="mode-road" class="mode-btn active" data-mode="road">
                        <span style="font-size: 32px;">🛣️</span>
                        <span>ROAD</span>
                    </button>
                    <button id="mode-water" class="mode-btn" data-mode="water">
                        <span style="font-size: 32px;">🌊</span>
                        <span>WATER</span>
                    </button>
                    <button id="mode-air" class="mode-btn" data-mode="air">
                        <span style="font-size: 32px;">☁️</span>
                        <span>AIR</span>
                    </button>
                </div>
            </div>

            <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px;">
                <button id="btn-start" class="btn btn-large">START ENGINE</button>
                <button id="btn-shop-menu" class="btn btn-secondary">GARAGE</button>
            </div>
        </div>
        
        <!-- Tela de Pausa -->
        <div id="pause-screen" class="overlay hidden">
            <h2 class="title-animation" style="color: #00c6ff;">PAUSED</h2>
            <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <button id="btn-resume" class="btn btn-large">RESUME</button>
                <button id="btn-shop-pause" class="btn btn-secondary">VISIT GARAGE</button>
            </div>
        </div>

        <!-- Tela de Game Over -->
        <div id="game-over" class="overlay hidden">
            <h2 class="title-animation">CRASHED!</h2>
            <div style="margin-bottom: 30px;">
                <p style="font-size: 16px; color: #aaa;">SCORE</p>
                <p style="font-size: 40px; font-weight: 900;" id="final-score">0</p>
                <p class="txt-gold" style="margin-top: 10px;">TOTAL GOLD: <span id="final-coins">0</span></p>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <button id="btn-restart" class="btn btn-large">TRY AGAIN</button>
                <button id="btn-shop-go" class="btn btn-secondary">GARAGE</button>
            </div>
        </div>

        <!-- Tela da Loja / Garagem -->
        <div id="shop" class="overlay hidden">
            <h2 class="title-animation" style="color: #ffd700; margin-bottom: 10px;">GARAGE</h2>
            <p class="txt-gold" style="margin-bottom: 20px; font-size: 18px;">GOLD: <span id="shop-coins">0</span></p>
            
            <div id="shop-items">
                <!-- Itens auto-gerados -->
            </div>
            
            <button id="btnCloseShop" class="btn btn-large mt-20" style="margin-top: 20px;">BACK TO RACE</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="shop.js"></script>
    <script src="game.js"></script>
</body>
</html>
